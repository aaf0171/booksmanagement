spring:
  application:
    name: books
  profiles:
    default: dev

server:
  port: 8082

app:
  activation:
    email:
      from: noreply@example.com
      subject: "Activate your account"
      base-url: http://localhost:3000

auth:
  jwt:
    secret-key: "${JWT_SECRET_KEY:defaultSecretKeyForDevelopmentPurposesOnlyChangeInProduction}"
    access-token-expiry-seconds: 900
  refresh-token:
    expiry-days: 30
